<!DOCTYPE HTML>
<html lang="en">
<head>
  <title>Python Programming - Snake Game</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/main.css" />
       
  <style>
    /* These are the only extra rules you need */
    #main {
      background: #ffffff;
      min-height: 100vh;
    }

    /* Typewriter effect */
    h1.type {
      color: black;
      font-family: serif;
      font-weight: 650;
      border-right: 2px solid #FCC979;
    }

    @keyframes caret { 50% { border-color: transparent; } }
    h1.type.caret { animation: caret 1s steps(1) infinite; }

    /* Snake Game Styling */
    #gameCanvas {
      background: #0b0f1a;
      border-radius: 12px;
      display: block;
      margin: 30px auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .game-container {
        text-align: center;
        padding: 50px 0;
    }
  </style>
</head>

<body class="is-preload">

  <header id="header">
    <div class="inner">
      <a href="portfolio.html" class="button">Back to projects</a>
    </div>
  </header>

  <div id="main">
    
    <section id="one">
      <header class="major">
        <h1 class="type caret" id="typeTarget"></h1>
      </header>
      <p>
        Built a simple Snake game in Python using basic game-loop logic, grid-based movement, and collision detection. 
        I implemented real-time input handling, food spawning, and score tracking, while managing the snake’s growth.
      </p>
    </section>

    <section id="two">
      <div class="game-container">
  <h2>🐍 Snake Game</h2>
  
  <div style="margin-bottom: 10px; font-family: serif;">
    <strong style="color: #000;">Score: </strong>
    <span id="scoreVal" style="color: #FCC979; font-weight: bold; font-size: 1.5em;">0</span>
  </div>

  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <div style="margin-top: 20px;text-align: center;">
    <button id="startBtn" class="button" style="cursor: pointer; display: inline-block; background-color: #141c2c; color: white; padding: 10px 20px; border-radius: 8px;">Start Game</button>
  </div>
</div>

  <script>
  // Fade in body
  window.addEventListener('load', () => document.body.style.opacity = "1");

  // Typewriter
  (function(){
    const text = "Python programming";
    const el = document.getElementById('typeTarget');
    let i = 0;
    function type(){
      el.textContent = text.slice(0, ++i);
      if(i < text.length) setTimeout(type, 60);
    }
    type();
  })();

  // Snake Game Logic
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("scoreVal"); 
  const startBtn = document.getElementById("startBtn"); 
  
  const grid = 20;
  let snake, dx, dy, food, score, counter;
  let gameActive = false; 

  function resetGame() {
    snake = [{x:160,y:160}];
    dx = grid;
    dy = 0;
    food = {x:80, y:80};
    score = 0;
    counter = 0;
    if(scoreEl) scoreEl.textContent = score; 
  }

  function loop(){
    if (!gameActive) return; 

    requestAnimationFrame(loop);
    if(++counter < 7) return;
    counter = 0;
    
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let head = {x: snake[0].x + dx, y: snake[0].y + dy};
    
    if(head.x < 0 || head.y < 0 || head.x >= 400 || head.y >= 400) {
      gameActive = false;
      startBtn.style.display = "inline-block";
      startBtn.textContent = "Restart Game";
      return;
    }

    if(head.x === food.x && head.y === food.y) {
        score += 10;
        if(scoreEl) scoreEl.textContent = score;
        food = {x: Math.floor(Math.random()*20)*grid, y: Math.floor(Math.random()*20)*grid};
    } else {
        snake.pop();
    }

    snake.unshift(head);
    ctx.fillStyle="orange"; ctx.fillRect(food.x, food.y, grid-2, grid-2);
    ctx.fillStyle="#00ff88"; snake.forEach(p => ctx.fillRect(p.x,p.y,grid-2,grid-2));
  }

  startBtn.addEventListener("click", () => {
    resetGame();
    gameActive = true;
    startBtn.style.display = "none"; 
    loop();
  });

  document.addEventListener("keydown", e => {
    if (!gameActive) return; 
    if(e.key==="ArrowUp" && dy===0){ dx=0; dy=-grid; }
    if(e.key==="ArrowDown" && dy===0){ dx=0; dy=grid; }
    if(e.key==="ArrowLeft" && dx===0){ dx=-grid; dy=0; }
    if(e.key==="ArrowRight" && dx===0){ dx=grid; dy=0; }
  });

  resetGame();
</script>

</body>
</html>
