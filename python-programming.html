<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Python Programming</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
        
    <style>
        #main {
            background: #ffffff;
            min-height: 100vh;
        }

        /* Typewriter effect styles */
        h1.type {
            color: black;
            font-family: serif;
            font-weight: 650;
            display: inline-block; /* Zorgt dat de cursor strak achter de tekst staat */
            border-right: 2px solid #FCC979;
        }

        @keyframes caret { 50% { border-color: transparent; } }
        h1.type.caret { animation: caret 1s steps(1) infinite; }
    </style>
</head>

<body class="is-preload" style="opacity: 0; transition: opacity 0.5s;">

    <header id="header">
        <div class="inner">
            <a href="portfolio.html" class="button">Back to projects</a>
        </div>
    </header>

    <div id="main">
        <section id="one">
            <header class="major">
                <h1 class="type caret" id="typeTarget"></h1>
            </header>
            <p>
                Built a simple project in Python focusing on clean logic and real-time execution.
                This project demonstrates my understanding of fundamental programming concepts and 
                efficient code structure.
            </p>
        </section>
    </div>

    <script>
        // Fade in body wanneer geladen
        window.addEventListener('load', () => {
            document.body.style.opacity = "1";
        });

        // Typewriter logica
        (function(){
            const text = "Python programming";
            const el = document.getElementById('typeTarget');
            let i = 0;

            function type(){
                if (el) {
                    el.textContent = text.slice(0, ++i);
                    if (i < text.length) {
                        setTimeout(type, 60);
                    }
                    // De 'caret' class blijft staan voor het knipper-effect
                }
            }
            
            // Start het effect
            type();
        })();
    </script>

</body>
</html>
