  <style>
    /* These are the only extra rules you need */
    #main {
      background: #ffffff;
      min-height: 100vh;
    }

    /* Typewriter effect */
    h1.type {
      color: black;
      font-family: serif;
      font-weight: 650;
      border-right: 2px solid #FCC979;
    }

    @keyframes caret { 50% { border-color: transparent; } }
    h1.type.caret { animation: caret 1s steps(1) infinite; }

    /* Snake Game Styling */
    #gameCanvas {
      background: #0b0f1a;
      border-radius: 12px;
      display: block;
      margin: 30px auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .game-container {
        text-align: center;
        padding: 50px 0;
    }
  </style>
</head>
