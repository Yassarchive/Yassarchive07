<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Python Programming</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
        :root { --orange: #FCC979; }
        
        /* Geen opacity 0 meer op de body */
        body { background: #fff; color: #000; margin: 0; }

        #main { padding: 4rem 1.25rem; }
        #about { max-width: 900px; margin: 0 auto; position: relative; }

        /* Typewriter blijft hetzelfde */
        h1.type {
            color: #000 !important;
            font-family: serif;
            font-weight: 800 !important;
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid var(--orange);
            width: 18ch;
            animation: typing 2s steps(18, end), blink 0.75s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 18ch } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--orange) } }

        /* Geen 'reveal' meer nodig, tekst staat direct goed */
        p { line-height: 1.8; }
    </style>
</head>
<body>
    <header id="header">
        <div class="inner"><a href="portfolio.html" class="button">Back to projects</a></div>
    </header>

    <main id="main">
        <section id="about">
            <h1 class="type">Python Programming</h1>
            <p>Under construction</p>
        </section>
    </main>
</body>
</html>
