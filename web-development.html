<!DOCTYPE HTML>
<html lang="en">
<head>
  <title> </title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/main.css" />

  <style>
    :root{
      --white:#ffffff !important;
      --orange:#FCC979 !important;
      --text:#000000 !important; 
      --navy: #ffffff; /* Gecorrigeerd naar wit zodat var(--navy) je pagina niet wit-op-wit maakt */
    }

    /* Pagina fade-in effect bij het laden */
    body{ opacity:0; transition:opacity .45s ease; background:var(--navy); color:var(--text); }
    body.ready{ opacity:1; }

    /* Styling en hover-effect voor de 'terug' knop */
    #header .button{
      transition: transform .18s ease, box-shadow .18s ease;
      border-color: rgba(0, 0, 0, 0.2);
    }
    #header .button:hover{
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,.25), 0 0 0 1px rgba(255,122,0,.25) inset;
    }

    /* Achtergrond gloed effecten (sectie accenten) */
    #about.section-glow{ position:relative; overflow:hidden; }
    #about.section-glow::before,
    #about.section-glow::after{
      content:"";
      position:absolute; border-radius:50%; filter: blur(90px); pointer-events:none;
      z-index: -1;
    }
    #about.section-glow::before{
      width:420px; height:420px; top:-140px; right:-140px;
      background: radial-gradient(circle, rgba(255,122,0,.35), transparent 60%);
    }
    #about.section-glow::after{
      width:360px; height:360px; bottom:-160px; left:-160px;
      background: radial-gradient(circle, rgba(28,42,87,.45), transparent 60%);
    }

    /* Typewriter effect voor de titel */
    h1.type {
      color: var(--text); 
      font-family: "Times New Roman Condensed", serif;
      font-weight: 650;
      white-space: nowrap; overflow: hidden;
      border-right: 2px solid var(--orange);
      display: inline-block;
    }
    @keyframes caret { 50% { border-color: transparent; } }
    h1.type.caret { animation: caret 1s steps(1) infinite; }

    /* Scroll reveal */
    .reveal { opacity:0; transform: translateY(14px); transition: opacity .6s ease, transform .6s ease; }
    .reveal.in { opacity:1; transform: none; }

    /* Afstand en layout instellingen */
    #main{ padding: 2.5rem 1.25rem; }
    #about{ max-width: 900px; margin: 0 auto; }
    #about p{ line-height: 1.8; font-size: 1.05rem; margin: 1rem 0; }

    /* Verwijder standaard template achtergronden */
    #about { background: none !important; }
    #about::before, #about::after { content: none !important; }
    #main { background: none !important; }
    #main::before, #main::after { content: none !important; }
  </style>
</head>
<body>

  <header id="header">
    <div class="inner">
      <a href="portfolio.html" class="button">Back to projects</a>
    </div>
  </header>

  <main id="main">
    <section id="about" class="section-glow">
      <h1 class="type caret" id="typeTarget" aria-label="Web development."></h1>

      <div class="project-layout">
        <div class="project-description">
          <p class="reveal">Under Construction</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    // 1. Maak de pagina zichtbaar (lost het witte scherm op)
    window.addEventListener('load', () => {
      document.body.classList.add('ready');
    });

    // 2. Typewriter effect
    (function(){
      const text = "Web development";
      const el = document.getElementById('typeTarget');
      let i = 0;
      function type(){
        if(!el) return;
        el.textContent = text.slice(0, ++i);
        if(i < text.length) setTimeout(type, 60);
      }
      setTimeout(type, 300); // Start iets na de fade-in
    })();

    // 3. Scroll Reveal voor de tekst
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          e.target.classList.add('in');
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el=> io.observe(el));
  </script>

</body>
</html>
