<!DOCTYPE HTML>
<html lang="en">
<head>
  <title>Web Development</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/main.css" />

  <style>
    :root {
      --white: #ffffff !important;
      --orange: #FCC979 !important;
      --text: #000000 !important; 
      --navy: #1c2a57; /* Toegevoegd zodat de variabele werkt */
    }

    /* Pagina fade-in effect */
    body { 
      opacity: 0; 
      transition: opacity .45s ease; 
      background: white; /* Of var(--navy) als je een donkere achtergrond wilt */
      color: var(--text); 
    }
    
    body.ready { opacity: 1; }

    /* Typewriter effect */
    h1.type {
      color: var(--text); 
      font-family: "Times New Roman Condensed", serif;
      font-weight: 650;
      display: inline-block;
      white-space: nowrap; 
      overflow: hidden;
      border-right: 2px solid var(--orange);
      min-height: 1.2em; /* Voorkomt verspringen van layout */
    }
    
    @keyframes caret { 50% { border-color: transparent; } }
    h1.type.caret { animation: caret 1s steps(1) infinite; }

    /* Scroll reveal */
    .reveal { opacity: 0; transform: translateY(14px); transition: opacity .6s ease, transform .6s ease; }
    .reveal.in { opacity: 1; transform: none; }

    #main { padding: 4rem 1.25rem; }
    #about { max-width: 900px; margin: 0 auto; position: relative; }
    
    /* Glow effecten */
    .section-glow::before {
      content: ""; position: absolute; border-radius: 50%; filter: blur(90px);
      width: 420px; height: 420px; top: -140px; right: -140px;
      background: radial-gradient(circle, rgba(255,122,0,0.15), transparent 60%);
      z-index: -1;
    }
  </style>
</head>
<body>

  <header id="header">
    <div class="inner">
      <a href="portfolio.html" class="button">Back to projects</a>
    </div>
  </header>

  <main id="main">
    <section id="about" class="section-glow">
      <h1 class="type caret" id="typeTarget" aria-label="Web development."></h1>
      <div class="project-layout">
        <p class="reveal">Under Construction</p>
      </div>
    </section>
  </main>

  <script>
    window.addEventListener('load', () => {
      document.body.classList.add('ready');
    });

    (function() {
      const text = "Web development";
      const el = document.getElementById('typeTarget');
      let i = 0;
      function type() {
        if (!el) return;
        el.textContent = text.slice(0, ++i);
        if (i < text.length) {
          setTimeout(type, 70);
        }
      }
      setTimeout(type, 300);
    })();

    // Zorgt dat "Under Construction" verschijnt
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  </script>

</body>
</html>
