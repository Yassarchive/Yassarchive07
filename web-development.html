<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Web Development</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />

    <style>
        :root {
            --white: #ffffff !important;
            --orange: #FCC979 !important;
            --text: #000000 !important; 
        }

        /* Pagina fade-in effect */
        body { opacity: 0; transition: opacity .45s ease; background: #ffffff; color: var(--text); }
        body.ready { opacity: 1; }

        /* Styling voor de 'terug' knop */
        #header .button {
            transition: transform .18s ease, box-shadow .18s ease;
            border-color: rgba(0, 0, 0, 0.2); /* Iets donkerder voor witte achtergrond */
        }
        #header .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0,0,0,.15), 0 0 0 1px rgba(255,122,0,.25) inset;
        }

        /* Achtergrond gloed effecten */
        #about.section-glow { position: relative; overflow: hidden; }
        #about.section-glow::before,
        #about.section-glow::after {
            content: "";
            position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none;
            z-index: -1;
        }
        #about.section-glow::before {
            width: 420px; height: 420px; top: -140px; right: -140px;
            background: radial-gradient(circle, rgba(255,122,0,.15), transparent 60%);
        }
        #about.section-glow::after {
            width: 360px; height: 360px; bottom: -160px; left: -160px;
            background: radial-gradient(circle, rgba(28,42,87,.1), transparent 60%);
        }

        /* Typewriter effect */
        h1.type {
            color: var(--text); 
            font-family: "Times New Roman Condensed", serif;
            font-weight: 650;
            display: inline-block;
            white-space: nowrap; 
            overflow: hidden;
            border-right: 2px solid var(--orange);
        }
        @keyframes caret { 50% { border-color: transparent; } }
        h1.type.caret { animation: caret 1s steps(1) infinite; }

        /* Scroll reveal */
        .reveal { opacity: 0; transform: translateY(14px); transition: opacity .6s ease, transform .6s ease; }
        .reveal.in { opacity: 1; transform: none; }

        /* Layout */
        #main { padding: 4rem 1.25rem; }
        #about { max-width: 900px; margin: 0 auto; background: none !important; }
        #about p { line-height: 1.8; font-size: 1.05rem; margin: 1rem 0; }

        /* Opschonen template ballast */
        #about::before, #about::after, #main::before, #main::after { content: none !important; }

        @media (prefers-reduced-motion: reduce) {
            body { transition: none !important; }
            .reveal { transition: none !important; transform: none !important; opacity: 1 !important; }
        }
    </style>
</head>
<body>

    <header id="header">
        <div class="inner">
            <a href="portfolio.html" class="button">Back to projects</a>
        </div>
    </header>

    <main id="main">
        <section id="about" class="section-glow">
            <h1 class="type caret" id="typeTarget" aria-label="Python Programming."></h1>
            <p class="reveal">Under construction</p>
        </section>
    </main>

    <script>
        // Start fade-in
        window.addEventListener('load', () => document.body.classList.add('ready'));

        // Typewriter Effect
        (function() {
            const text = "Web Development";
            const el = document.getElementById('typeTarget');
            let i = 0;
            function type() {
                if (!el) return;
                el.textContent = text.slice(0, ++i);
                if (i < text.length) {
                    setTimeout(type, 70);
                } else {
                    el.classList.add('caret');
                }
            }
            // Kleine vertraging voor een natuurlijker begin na de fade-in
            setTimeout(type, 500);
        })();

        // Scroll Reveal Logic
        const io = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('in');
                    io.unobserve(e.target);
                }
            });
        }, { threshold: 0.12 });

        document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    </script>
</body>
</html>
